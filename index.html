<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js" integrity="sha384-XcdcwHqIPULERb2yDEM4R0XaQKU3YnDsrTmjACBZyfdVVqjh6xQ4/DCMd7XLcA6Y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js" integrity="sha384-wHFvAtjmgnkA2PJcMsDaCgdipf7X7YV44X/igbLHpvGiq6T5/PvFKl93grpvtbQT" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FinTrack">
<link rel="apple-touch-icon" href="icon-192.png">
<script>
// Apply saved theme immediately so splash renders in correct mode
(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;})();
</script>
</head>
<body>
<!-- Splash Screen (theme-aware) -->
<div id="ftSplash" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.4s ease,visibility 0.4s ease">
  <div class="ft-splash-glow"></div>
  <div style="position:relative;width:76px;height:76px;margin-bottom:22px">
    <div class="ft-splash-box">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="animation:ftSplashIcon 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s both"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
    </div>
    <div class="ft-splash-ring"></div>
    <div class="ft-splash-ring ft-splash-ring-2"></div>
    <div class="ft-splash-shimmer"></div>
  </div>
  <div class="ft-splash-title">FinTrack</div>
  <div class="ft-splash-sub">Premium</div>
  <div class="ft-splash-loader"><span></span><span></span><span></span></div>
  <div class="ft-splash-version">v15.7</div>
</div>
<style>
/* Splash - Dark Mode (default) */
#ftSplash{background:oklch(0.12 0.02 260)}
.ft-splash-glow{position:absolute;width:180px;height:180px;border-radius:50%;background:oklch(0.4 0.2 260/0.2);filter:blur(50px);animation:ftGlow 2.5s ease-in-out infinite}
.ft-splash-box{position:absolute;inset:0;border-radius:19px;background:linear-gradient(135deg,oklch(0.55 0.22 260),oklch(0.42 0.24 285));display:flex;align-items:center;justify-content:center;animation:ftBoxPulse 2s ease-in-out infinite;box-shadow:0 8px 28px oklch(0.5 0.22 260/0.45)}
.ft-splash-ring{position:absolute;inset:-6px;border-radius:25px;border:2px solid oklch(0.55 0.2 260/0.4);animation:ftRing 2s ease-in-out infinite}
.ft-splash-ring-2{border-width:1.5px;border-color:oklch(0.55 0.2 260/0.2);animation-delay:1s}
.ft-splash-shimmer{position:absolute;inset:0;border-radius:19px;overflow:hidden}
.ft-splash-shimmer::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(105deg,transparent 40%,oklch(1 0 0/0.07) 45%,oklch(1 0 0/0.12) 50%,oklch(1 0 0/0.07) 55%,transparent 60%);animation:ftShimmer 3s ease-in-out infinite}
.ft-splash-title{font-family:'Inter',system-ui,sans-serif;font-size:20px;font-weight:700;color:oklch(0.97 0.005 260);letter-spacing:-0.3px;animation:ftTextUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.4s both}
.ft-splash-sub{font-family:'Inter',system-ui,sans-serif;font-size:10px;font-weight:600;color:oklch(0.5 0.04 260);letter-spacing:0.1em;text-transform:uppercase;margin-top:5px;animation:ftTextUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.6s both}
.ft-splash-loader{position:absolute;bottom:90px;display:flex;gap:6px}
.ft-splash-loader span{width:5px;height:5px;border-radius:50%;background:oklch(0.55 0.2 260);animation:ftDot 1.2s ease-in-out infinite}
.ft-splash-loader span:nth-child(2){animation-delay:0.15s}
.ft-splash-loader span:nth-child(3){animation-delay:0.3s}
.ft-splash-version{position:absolute;bottom:56px;font-family:'Inter',system-ui,sans-serif;font-size:10px;color:oklch(0.32 0.01 260);font-weight:500}

/* Splash - Light Mode */
[data-theme="light"] #ftSplash{background:oklch(0.98 0.005 260)}
[data-theme="light"] .ft-splash-glow{background:oklch(0.75 0.12 260/0.12)}
[data-theme="light"] .ft-splash-box{box-shadow:0 6px 24px oklch(0.5 0.2 260/0.3),0 2px 8px oklch(0 0 0/0.08);animation-name:ftBoxPulseLight}
[data-theme="light"] .ft-splash-ring{border-color:oklch(0.5 0.15 260/0.25);animation-duration:2.2s}
[data-theme="light"] .ft-splash-ring-2{border-color:oklch(0.5 0.15 260/0.12)}
[data-theme="light"] .ft-splash-shimmer::after{background:linear-gradient(105deg,transparent 40%,oklch(1 0 0/0.2) 45%,oklch(1 0 0/0.35) 50%,oklch(1 0 0/0.2) 55%,transparent 60%)}
[data-theme="light"] .ft-splash-title{color:oklch(0.15 0.02 260)}
[data-theme="light"] .ft-splash-sub{color:oklch(0.5 0.06 260)}
[data-theme="light"] .ft-splash-loader span{background:oklch(0.5 0.18 260)}
[data-theme="light"] .ft-splash-version{color:oklch(0.7 0.01 260)}

@keyframes ftGlow{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.3);opacity:0.3}}
@keyframes ftBoxPulse{0%,100%{transform:scale(1);box-shadow:0 8px 28px oklch(0.5 0.22 260/0.45)}50%{transform:scale(1.04);box-shadow:0 12px 36px oklch(0.5 0.22 260/0.55),0 0 0 8px oklch(0.5 0.22 260/0.08)}}
@keyframes ftBoxPulseLight{0%,100%{transform:scale(1);box-shadow:0 6px 24px oklch(0.5 0.2 260/0.3),0 2px 8px oklch(0 0 0/0.08)}50%{transform:scale(1.03);box-shadow:0 10px 32px oklch(0.5 0.2 260/0.4),0 4px 12px oklch(0 0 0/0.06)}}
@keyframes ftRing{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.12);opacity:0}}
@keyframes ftShimmer{0%{transform:translateX(-100%) rotate(25deg)}35%,100%{transform:translateX(100%) rotate(25deg)}}
@keyframes ftSplashIcon{from{opacity:0;transform:scale(0.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes ftTextUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ftDot{0%,60%,100%{transform:scale(0.6);opacity:0.3}30%{transform:scale(1);opacity:1}}
</style>
<div class="app" id="app">
<aside class="sb" id="sb">
  <div class="sb-brand">
    <div class="sb-icon"><i data-lucide="wallet" width="18" height="18"></i></div>
    <h1>FinTrack</h1>
  </div>
  <nav class="sb-nav">
    <div class="nsec">Overview</div>
    <a class="ni active" data-page="dashboard"><i data-lucide="layout-dashboard" width="18" height="18"></i><span class="nlbl">Dashboard</span></a>
    <a class="ni" data-page="transactions"><i data-lucide="receipt" width="18" height="18"></i><span class="nlbl">Transactions</span></a>
    <div class="nsec">Wealth</div>
    <a class="ni" data-page="investments"><i data-lucide="trending-up" width="18" height="18"></i><span class="nlbl">Investments</span></a>
    <a class="ni" data-page="goals"><i data-lucide="target" width="18" height="18"></i><span class="nlbl">Goals</span></a>
    <div class="nsec">Insights</div>
    <a class="ni" data-page="analytics"><i data-lucide="bar-chart-3" width="18" height="18"></i><span class="nlbl">Analytics</span></a>
    <a class="ni" data-page="reports"><i data-lucide="file-text" width="18" height="18"></i><span class="nlbl">Reports</span></a>
    <div class="nsec">System</div>
    <a class="ni" data-page="settings"><i data-lucide="settings" width="18" height="18"></i><span class="nlbl">Settings</span></a>
  </nav>
  <div class="sb-user">
    <div class="sb-avatar">MI</div>
    <div class="sb-user-info">
      <div style="color:oklch(0.9 0.005 260);font-weight:500;font-size:12px">Irsyad</div>
      <div style="color:oklch(0.5 0.01 260);font-size:10px" id="sb-version">FinTrack Premium</div>
    </div>
  </div>
</aside>
<main class="mn">
  <header class="hdr">
    <div class="hdr-l">
      <button class="sb-tog" onclick="toggleSB()"><i data-lucide="panel-left" width="16" height="16"></i></button>
      <div>
        <h2 id="pt">Dashboard</h2>
        <p id="ps">Financial overview</p>
      </div>
    </div>
    <div class="hdr-r">
      <select class="fsel" id="yf" onchange="refresh()"></select>
      <select class="fsel" id="mf" onchange="refresh()">
        <option value="total">Total Year</option>
        <option value="0">Jan</option>
        <option value="1">Feb</option>
        <option value="2">Mar</option>
        <option value="3">Apr</option>
        <option value="4">May</option>
        <option value="5">Jun</option>
        <option value="6">Jul</option>
        <option value="7">Aug</option>
        <option value="8">Sep</option>
        <option value="9">Oct</option>
        <option value="10">Nov</option>
        <option value="11">Dec</option>
      </select>
      <button class="ibtn" onclick="toggleNotifPanel()" id="notifBtn"><i data-lucide="bell" width="16" height="16"></i><span class="bdg" id="notifBdg" style="display:none">0</span></button>
      <button class="ibtn" onclick="toggleTheme()"><i data-lucide="sun" width="16" height="16" id="thico"></i></button>
    </div>
  </header>
  <div class="cnt" id="cnt"></div>
</main>
</div>
<div class="toast" id="toast"></div>
<script src="js/i18n.js"></script>
<script src="js/currency.js"></script>
<script src="js/data.js"></script>
<script src="js/helpers.js"></script>
<script src="js/router.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/transactions.js"></script>
<script src="js/investments.js"></script>
<script src="js/goals.js"></script>
<script src="js/analytics.js"></script>
<script src="js/reports.js"></script>
<script src="js/ai.js"></script>
<script src="js/settings.js"></script>
<script src="js/init.js"></script>
</body>
</html>
