<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack Premium V15.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js" integrity="sha384-XcdcwHqIPULERb2yDEM4R0XaQKU3YnDsrTmjACBZyfdVVqjh6xQ4/DCMd7XLcA6Y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js" integrity="sha384-wHFvAtjmgnkA2PJcMsDaCgdipf7X7YV44X/igbLHpvGiq6T5/PvFKl93grpvtbQT" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FinTrack">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div class="app" id="app">
<aside class="sb" id="sb">
  <div class="sb-brand">
    <div class="sb-icon"><i data-lucide="wallet" width="18" height="18"></i></div>
    <h1>FinTrack</h1>
  </div>
  <nav class="sb-nav">
    <div class="nsec">Overview</div>
    <a class="ni active" data-page="dashboard"><i data-lucide="layout-dashboard" width="18" height="18"></i><span class="nlbl">Dashboard</span></a>
    <a class="ni" data-page="transactions"><i data-lucide="receipt" width="18" height="18"></i><span class="nlbl">Transactions</span></a>
    <div class="nsec">Wealth</div>
    <a class="ni" data-page="investments"><i data-lucide="trending-up" width="18" height="18"></i><span class="nlbl">Investments</span></a>
    <a class="ni" data-page="goals"><i data-lucide="target" width="18" height="18"></i><span class="nlbl">Goals</span></a>
    <div class="nsec">Insights</div>
    <a class="ni" data-page="analytics"><i data-lucide="bar-chart-3" width="18" height="18"></i><span class="nlbl">Analytics</span></a>
    <a class="ni" data-page="reports"><i data-lucide="file-text" width="18" height="18"></i><span class="nlbl">Reports</span></a>
    <div class="nsec">System</div>
    <a class="ni" data-page="settings"><i data-lucide="settings" width="18" height="18"></i><span class="nlbl">Settings</span></a>
  </nav>
  <div class="sb-user">
    <div class="sb-avatar">MI</div>
    <div class="sb-user-info">
      <div style="color:oklch(0.9 0.005 260);font-weight:500;font-size:12px">Irsyad</div>
      <div style="color:oklch(0.5 0.01 260);font-size:10px">FinTrack Premium V15.0</div>
    </div>
  </div>
</aside>
<main class="mn">
  <header class="hdr">
    <div class="hdr-l">
      <button class="sb-tog" onclick="toggleSB()"><i data-lucide="panel-left" width="16" height="16"></i></button>
      <div>
        <h2 id="pt">Dashboard</h2>
        <p id="ps">Financial overview</p>
      </div>
    </div>
    <div class="hdr-r">
      <select class="fsel" id="yf" onchange="refresh()"></select>
      <select class="fsel" id="mf" onchange="refresh()">
        <option value="total">Total Year</option>
        <option value="0">Jan</option>
        <option value="1">Feb</option>
        <option value="2">Mar</option>
        <option value="3">Apr</option>
        <option value="4">May</option>
        <option value="5">Jun</option>
        <option value="6">Jul</option>
        <option value="7">Aug</option>
        <option value="8">Sep</option>
        <option value="9">Oct</option>
        <option value="10">Nov</option>
        <option value="11">Dec</option>
      </select>
      <button class="ibtn" onclick="toggleNotifPanel()" id="notifBtn"><i data-lucide="bell" width="16" height="16"></i><span class="bdg" id="notifBdg" style="display:none">0</span></button>
      <button class="ibtn" onclick="toggleTheme()"><i data-lucide="sun" width="16" height="16" id="thico"></i></button>
    </div>
  </header>
  <div class="cnt" id="cnt"></div>
</main>
</div>
<div class="toast" id="toast"></div>
<script src="js/i18n.js"></script>
<script src="js/currency.js"></script>
<script src="js/data.js"></script>
<script src="js/helpers.js"></script>
<script src="js/router.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/transactions.js"></script>
<script src="js/investments.js"></script>
<script src="js/goals.js"></script>
<script src="js/analytics.js"></script>
<script src="js/reports.js"></script>
<script src="js/ai.js"></script>
<script src="js/settings.js"></script>
<script src="js/init.js"></script>
</body>
</html>
